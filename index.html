<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>智慧菜地管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0f2e9 0%, #c8e6df 100%); min-height: 100vh; padding: 20px; color: #1e3a2f; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.95); border-radius: 32px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); padding: 24px; border: 1px solid rgba(70,130,100,0.2); }
        .login-wrapper { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .login-card { width: 100%; max-width: 420px; background: white; border-radius: 40px; padding: 36px 28px; box-shadow: 0 20px 35px rgba(0,0,0,0.1); }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header i { font-size: 56px; color: #2b7a4b; background: #e9f5ef; padding: 15px; border-radius: 60px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #1f4d3c; }
        .input-group input { width: 100%; padding: 14px 16px; border-radius: 28px; border: 1.5px solid #cfdfd7; font-size: 1rem; background: #fefefe; }
        .btn { border: none; background: #2b7a4b; color: white; font-weight: 600; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-size: 1rem; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-primary { background: #2b7a4b; width: 100%; }
        .btn-primary:hover { background: #1e5e3a; }
        .btn-outline { background: transparent; border: 1.5px solid #2b7a4b; color: #2b7a4b; }
        .btn-sm { padding: 6px 14px; font-size: 0.85rem; }
        .btn-danger { background: #c0392b; }
        .btn-danger:hover { background: #a53226; }
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 1.8rem; font-weight: 700; background: #1e3a2f; padding: 8px 20px; border-radius: 60px; color: #f5f9e3; }
        .dashboard { display: flex; flex-wrap: wrap; gap: 28px; }
        .plots-sidebar { flex: 1.2; min-width: 260px; }
        .detail-main { flex: 2.8; min-width: 300px; }
        .plot-list { display: flex; flex-direction: column; gap: 14px; margin-top: 20px; max-height: 70vh; overflow-y: auto; padding-right: 5px; }
        .plot-item { background: #f9fefb; border-radius: 24px; padding: 16px; cursor: pointer; border: 1px solid #cde3d9; display: flex; justify-content: space-between; align-items: center; }
        .plot-item.active { background: #e1f5ea; border-left: 6px solid #2b7a4b; }
        .plot-info h4 { font-size: 1.2rem; margin-bottom: 6px; }
        .plot-badge { background: #d1e7dd; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; }
        .action-icons i { margin-left: 10px; cursor: pointer; color: #5f8b76; }
        .action-icons i:hover { color: #2b7a4b; }
        .section-title { font-size: 1.4rem; font-weight: 600; margin: 20px 0 16px 0; border-left: 5px solid #2b7a4b; padding-left: 16px; }
        .record-card { background: #f8faf7; border-radius: 24px; padding: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .timeline-photo { max-width: 100%; max-height: 200px; border-radius: 16px; margin-top: 8px; }
        .date-filter { background: #f1f7f3; border-radius: 28px; padding: 16px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 140px; }
        .filter-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #1f4d3c; }
        .filter-group input { width: 100%; padding: 10px 12px; border-radius: 24px; border: 1px solid #cde3d9; }
        .clear-filter { background: #cde3d9; color: #1e3a2f; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 40px; width: 90%; max-width: 500px; padding: 20px; text-align: center; }
        video { width: 100%; border-radius: 24px; background: #000; margin: 15px 0; }
        .empty-tip { color: #7d9e8a; padding: 24px; text-align: center; font-style: italic; }
        hr { margin: 16px 0; border-color: #cde3d9; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .info-tip { font-size: 0.85rem; color: #5f8b76; text-align: center; margin-top: 16px; }
        i { pointer-events: none; }
        button i { pointer-events: auto; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <!-- 登录区域 -->
    <div id="loginPanel" class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-seedling"></i>
                <h2>智慧菜地管家</h2>
                <p>登录后管理您的菜园</p>
            </div>
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> 用户名</label>
                <input type="email" id="loginEmail" placeholder="your@email.com">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> 密码</label>
                <input type="password" id="loginPassword" placeholder="密码">
            </div>
            <button class="btn btn-primary" id="doLoginBtn">登录</button>
            <div class="info-tip">
                <i class="fas fa-info-circle"></i> 如需账号，请联系管理员
            </div>
        </div>
    </div>

    <!-- 主应用面板 -->
    <div id="appPanel" style="display: none;">
        <div class="app-header">
            <div class="logo"><i class="fas fa-carrot"></i> 我的菜地</div>
            <div class="user-info">
                <span><i class="fas fa-user-circle"></i> <span id="currentUserName"></span></span>
                <button class="btn btn-sm btn-outline" id="logoutBtn">退出</button>
            </div>
        </div>
        <div class="dashboard">
            <div class="plots-sidebar card">
                <div class="flex-between">
                    <h3><i class="fas fa-map-marked-alt"></i> 菜地区域</h3>
                    <button class="btn btn-sm btn-primary" id="addPlotBtn">新增菜地</button>
                </div>
                <div id="plotListContainer" class="plot-list"></div>
            </div>
            <div class="detail-main card">
                <div id="selectedPlotInfo">
                    <h2><i class="fas fa-leaf"></i> <span id="selectedPlotName">未选中菜地</span></h2>
                    <p><span id="selectedCropType">--</span></p>
                </div>
                <hr>
                <div class="section-title"><i class="fas fa-history"></i> 活动记录</div>
                <div class="date-filter">
                    <div class="filter-group"><label>起始日期</label><input type="date" id="startDate"></div>
                    <div class="filter-group"><label>结束日期</label><input type="date" id="endDate"></div>
                    <div class="filter-actions">
                        <button class="btn btn-sm btn-primary" id="applyDateFilter">筛选</button>
                        <button class="btn btn-sm clear-filter" id="clearDateFilter">重置</button>
                    </div>
                </div>
                <div id="activityTimeline"></div>

                <div class="section-title"><i class="fas fa-tint"></i> 添加施肥记录</div>
                <div style="background:#f1f7f3; border-radius:28px; padding:16px;">
                    <div style="display: flex; flex-wrap: wrap; gap: 12px;">
                        <input type="date" id="fertDate" style="flex:1; padding: 10px; border-radius: 30px; border:1px solid #cde3d9;">
                        <input type="text" id="fertType" placeholder="肥料类型" style="flex:2; padding: 10px; border-radius: 30px;">
                        <input type="text" id="fertAmount" placeholder="用量" style="flex:1; padding: 10px; border-radius: 30px;">
                        <button class="btn btn-primary btn-sm" id="submitFertilizerBtn">记录</button>
                    </div>
                </div>

                <div class="section-title"><i class="fas fa-camera"></i> 拍照记录</div>
                <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                    <button class="btn btn-primary" id="openCameraBtn">拍照记录</button>
                    <button class="btn btn-outline" id="uploadPhotoBtn">上传图片</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="cameraModal" class="modal">
    <div class="modal-content">
        <h3>拍摄作物照片</h3>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div class="camera-buttons">
            <button class="btn btn-primary" id="captureBtn">拍照</button>
            <button class="btn btn-outline" id="closeCameraBtn">关闭</button>
        </div>
    </div>
</div>

<script>
    // ==================== Supabase 配置 ====================
    // 请替换为您的 Supabase 项目信息（从 Settings → API 获取）
    const SUPABASE_URL = 'https://rqqmanysmubzlkevkmhj.supabase.co';      // 替换为您的 Project URL
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxcW1hbnlzbXViemxrZXZrbWhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwOTQ5OTEsImV4cCI6MjA5MDY3MDk5MX0.0EBYH6XBVhAbXyqzMponf1cIVCK1Z4aEJkwZ4Zc8AZs';  // 替换为您的 anon public key
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentPlotId = null;
    let videoStream = null;
    let currentDateFilter = { startDate: null, endDate: null };

    // DOM 元素
    const loginPanel = document.getElementById('loginPanel');
    const appPanel = document.getElementById('appPanel');
    const currentUserNameSpan = document.getElementById('currentUserName');
    const plotListContainer = document.getElementById('plotListContainer');
    const selectedPlotNameSpan = document.getElementById('selectedPlotName');
    const selectedCropTypeSpan = document.getElementById('selectedCropType');
    const activityTimelineDiv = document.getElementById('activityTimeline');

    // ========== 辅助函数 ==========
    function escapeHtml(str) { 
        if(!str) return ''; 
        return str.replace(/[&<>]/g, function(m){ 
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        }); 
    }

    // ========== 云端数据操作 ==========
    async function getPlots() {
        if (!currentUser) return [];
        const { data, error } = await supabase
            .from('plots')
            .select('*')
            .eq('user_id', currentUser.id)
            .order('created_at', { ascending: false });
        if (error) { console.error('获取菜地失败:', error); return []; }
        return data || [];
    }

    async function addPlot(name, cropType) {
        if (!currentUser) return null;
        const { data, error } = await supabase
            .from('plots')
            .insert({
                name: name,
                crop_type: cropType,
                user_id: currentUser.id,
                created_at: Date.now()
            })
            .select()
            .single();
        if (error) { console.error('添加菜地失败:', error); return null; }
        return data;
    }

    async function updatePlot(plotId, updates) {
        const { error } = await supabase
            .from('plots')
            .update(updates)
            .eq('id', plotId)
            .eq('user_id', currentUser.id);
        if (error) console.error('更新菜地失败:', error);
    }

    async function deletePlot(plotId) {
        // 先删除关联的施肥记录
        await supabase.from('fertilizations').delete().eq('plot_id', plotId);
        // 再删除关联的照片记录
        await supabase.from('photos').delete().eq('plot_id', plotId);
        // 最后删除菜地
        const { error } = await supabase
            .from('plots')
            .delete()
            .eq('id', plotId)
            .eq('user_id', currentUser.id);
        if (error) console.error('删除菜地失败:', error);
    }

    async function getFertilizations(plotId) {
        const { data, error } = await supabase
            .from('fertilizations')
            .select('*')
            .eq('plot_id', plotId)
            .order('created_at', { ascending: false });
        if (error) { console.error('获取施肥记录失败:', error); return []; }
        return data || [];
    }

    async function addFertilizer(plotId, date, type, amount) {
        const { error } = await supabase
            .from('fertilizations')
            .insert({
                plot_id: plotId,
                date: date,
                fertilizer_type: type,
                amount: amount,
                created_at: Date.now()
            });
        if (error) console.error('添加施肥记录失败:', error);
    }

    async function deleteFertilizer(fertId) {
        const { error } = await supabase
            .from('fertilizations')
            .delete()
            .eq('id', fertId);
        if (error) console.error('删除施肥记录失败:', error);
    }

    async function getPhotos(plotId) {
        const { data, error } = await supabase
            .from('photos')
            .select('*')
            .eq('plot_id', plotId)
            .order('created_at', { ascending: false });
        if (error) { console.error('获取照片失败:', error); return []; }
        return data || [];
    }

    async function addPhotoRecord(plotId, imageData) {
        try {
            // 将 base64 转换为 Blob
            const base64Data = imageData.split(',')[1];
            const byteCharacters = atob(base64Data);
            const byteArrays = [];
            for (let i = 0; i < byteCharacters.length; i += 512) {
                const slice = byteCharacters.slice(i, i + 512);
                const byteNumbers = new Array(slice.length);
                for (let j = 0; j < slice.length; j++) {
                    byteNumbers[j] = slice.charCodeAt(j);
                }
                byteArrays.push(new Uint8Array(byteNumbers));
            }
            const blob = new Blob(byteArrays, { type: 'image/jpeg' });
            
            // 生成唯一文件名
            const fileName = `${Date.now()}.jpg`;
            const filePath = `${currentUser.id}/${fileName}`;
            
            // 上传到 Storage
            const { error: uploadError } = await supabase.storage
                .from('garden-photos')
                .upload(filePath, blob);
            
            if (uploadError) {
                console.error('上传照片失败:', uploadError);
                alert('上传失败：' + uploadError.message);
                return;
            }
            
            // 获取公开 URL
            const { data: urlData } = supabase.storage
                .from('garden-photos')
                .getPublicUrl(filePath);
            
            // 保存记录到数据库
            const { error: insertError } = await supabase
                .from('photos')
                .insert({
                    plot_id: plotId,
                    image_url: urlData.publicUrl,
                    date: new Date().toLocaleString(),
                    created_at: Date.now()
                });
            
            if (insertError) console.error('保存照片记录失败:', insertError);
        } catch (err) {
            console.error('添加照片失败:', err);
            alert('添加照片失败，请重试');
        }
    }

    async function deletePhoto(photoId) {
        // 先获取照片信息以便删除 Storage 文件（可选，这里简化处理）
        const { error } = await supabase
            .from('photos')
            .delete()
            .eq('id', photoId);
        if (error) console.error('删除照片记录失败:', error);
    }

    // ========== 渲染函数 ==========
    async function renderPlotsList() {
        if (!currentUser) return;
        const plots = await getPlots();
        if (plots.length === 0) {
            plotListContainer.innerHTML = `<div class="empty-tip">暂无菜地，点击“新增菜地”开始耕种</div>`;
            if (currentPlotId) currentPlotId = null;
            renderEmptyDetail();
            return;
        }
        
        let html = '';
        plots.forEach(plot => {
            const isActive = (currentPlotId === plot.id);
            html += `
                <div class="plot-item ${isActive ? 'active' : ''}" data-plot-id="${plot.id}">
                    <div class="plot-info">
                        <h4>${escapeHtml(plot.name)}</h4>
                        <span class="plot-badge">${escapeHtml(plot.crop_type)}</span>
                    </div>
                    <div class="action-icons">
                        <i class="fas fa-edit edit-plot" data-id="${plot.id}"></i>
                        <i class="fas fa-trash-alt delete-plot" data-id="${plot.id}" style="color:#c0392b;"></i>
                    </div>
                </div>
            `;
        });
        plotListContainer.innerHTML = html;
        
        // 绑定菜地点击事件
        document.querySelectorAll('.plot-item').forEach(el => {
            el.addEventListener('click', async (e) => {
                if (e.target.classList.contains('edit-plot') || e.target.classList.contains('delete-plot')) return;
                const pid = el.dataset.plotId;
                if (pid) {
                    currentPlotId = pid;
                    await renderPlotsList();
                    await renderCurrentPlotDetails();
                }
            });
        });
        
        // 编辑菜地
        document.querySelectorAll('.edit-plot').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const pid = btn.dataset.id;
                const plot = plots.find(p => p.id === pid);
                if (!plot) return;
                const newName = prompt("菜地名称:", plot.name);
                if (newName) await updatePlot(pid, { name: newName.trim() });
                const newCrop = prompt("种植品种:", plot.crop_type);
                if (newCrop) await updatePlot(pid, { crop_type: newCrop.trim() });
                await renderPlotsList();
            });
        });
        
        // 删除菜地
        document.querySelectorAll('.delete-plot').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (!confirm("删除菜地将同时删除所有记录，确定吗？")) return;
                const pid = btn.dataset.id;
                await deletePlot(pid);
                if (currentPlotId === pid) currentPlotId = null;
                await renderPlotsList();
            });
        });
        
        if ((!currentPlotId || !plots.find(p => p.id === currentPlotId)) && plots.length > 0) {
            currentPlotId = plots[0].id;
            await renderPlotsList();
            await renderCurrentPlotDetails();
        } else if (currentPlotId && plots.find(p => p.id === currentPlotId)) {
            await renderCurrentPlotDetails();
        }
    }

    async function renderCurrentPlotDetails() {
        if (!currentPlotId || !currentUser) {
            renderEmptyDetail();
            return;
        }
        const plots = await getPlots();
        const plot = plots.find(p => p.id === currentPlotId);
        if (!plot) {
            renderEmptyDetail();
            currentPlotId = null;
            return;
        }
        selectedPlotNameSpan.innerText = plot.name;
        selectedCropTypeSpan.innerHTML = `<i class="fas fa-apple-alt"></i> 品种：${escapeHtml(plot.crop_type)}`;
        
        const ferts = await getFertilizations(currentPlotId);
        const photos = await getPhotos(currentPlotId);
        let timeline = [];
        
        ferts.forEach(f => {
            timeline.push({
                type: 'fertilizer', id: f.id, date: f.date, sortTime: new Date(f.date).getTime(),
                fertilizerType: f.fertilizer_type, amount: f.amount
            });
        });
        photos.forEach(p => {
            timeline.push({
                type: 'photo', id: p.id, date: p.date, sortTime: p.created_at,
                imageUrl: p.image_url
            });
        });
        
        const start = currentDateFilter.startDate ? new Date(currentDateFilter.startDate).setHours(0,0,0,0) : null;
        const end = currentDateFilter.endDate ? new Date(currentDateFilter.endDate).setHours(23,59,59,999) : null;
        if (start || end) {
            timeline = timeline.filter(r => {
                const time = r.sortTime;
                if (start && end) return time >= start && time <= end;
                if (start) return time >= start;
                if (end) return time <= end;
                return true;
            });
        }
        timeline.sort((a,b) => b.sortTime - a.sortTime);
        
        if (timeline.length === 0) {
            activityTimelineDiv.innerHTML = '<div class="empty-tip">暂无活动记录</div>';
            return;
        }
        
        let html = '';
        timeline.forEach(r => {
            if (r.type === 'fertilizer') {
                html += `
                    <div class="record-card">
                        <div><i class="fas fa-tint" style="color:#2b7a4b;"></i> <strong>施肥</strong> | ${escapeHtml(r.date)} | ${escapeHtml(r.fertilizerType)} 用量 ${escapeHtml(r.amount)}</div>
                        <button class="btn btn-sm btn-danger del-fertilizer" data-id="${r.id}">删除</button>
                    </div>
                `;
            } else {
                html += `
                    <div class="record-card" style="flex-direction:column; align-items:flex-start;">
                        <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:8px;">
                            <div><i class="fas fa-camera" style="color:#2b7a4b;"></i> <strong>拍照记录</strong> | ${escapeHtml(r.date)}</div>
                            <button class="btn btn-sm btn-danger del-photo" data-id="${r.id}">删除</button>
                        </div>
                        <img src="${r.imageUrl}" class="timeline-photo" alt="作物照片" onerror="this.style.display='none'">
                    </div>
                `;
            }
        });
        activityTimelineDiv.innerHTML = html;
        
        document.querySelectorAll('.del-fertilizer').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const fertId = btn.dataset.id;
                await deleteFertilizer(fertId);
                await renderCurrentPlotDetails();
            });
        });
        document.querySelectorAll('.del-photo').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const photoId = btn.dataset.id;
                await deletePhoto(photoId);
                await renderCurrentPlotDetails();
            });
        });
    }
    
    function renderEmptyDetail() {
        selectedPlotNameSpan.innerText = '未选中菜地';
        selectedCropTypeSpan.innerText = '--';
        activityTimelineDiv.innerHTML = '<div class="empty-tip">暂无活动记录</div>';
    }

    // ========== 交互事件 ==========
    document.getElementById('addPlotBtn').addEventListener('click', async () => {
        const name = prompt("菜地名称:");
        if (!name) return;
        const crop = prompt("种植品种:", "番茄");
        if (!crop) return;
        await addPlot(name.trim(), crop.trim());
        await renderPlotsList();
    });
    
    document.getElementById('submitFertilizerBtn').addEventListener('click', async () => {
        if (!currentPlotId) { alert("请先选择菜地"); return; }
        const date = document.getElementById('fertDate').value;
        const type = document.getElementById('fertType').value.trim();
        const amount = document.getElementById('fertAmount').value.trim();
        if (!date || !type || !amount) { alert("请完整填写施肥信息"); return; }
        await addFertilizer(currentPlotId, date, type, amount);
        document.getElementById('fertType').value = '';
        document.getElementById('fertAmount').value = '';
        await renderCurrentPlotDetails();
    });
    
    // 摄像头相关
    async function openCameraModal() {
        const modal = document.getElementById('cameraModal');
        const video = document.getElementById('video');
        modal.style.display = 'flex';
        try {
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } } });
            videoStream = stream;
            video.srcObject = stream;
        } catch (err) {
            alert("无法访问摄像头");
            modal.style.display = 'none';
        }
    }
    
    function capturePhoto() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const imageData = canvas.toDataURL('image/jpeg', 0.7);
        if (currentPlotId) {
            addPhotoRecord(currentPlotId, imageData).then(() => {
                renderCurrentPlotDetails();
                closeCameraModal();
            });
        } else {
            alert("请先选择菜地");
            closeCameraModal();
        }
    }
    
    function closeCameraModal() {
        const modal = document.getElementById('cameraModal');
        if (videoStream) {
            videoStream.getTracks().forEach(t => t.stop());
            videoStream = null;
        }
        modal.style.display = 'none';
    }
    
    document.getElementById('openCameraBtn').addEventListener('click', openCameraModal);
    document.getElementById('uploadPhotoBtn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file && currentPlotId) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    await addPhotoRecord(currentPlotId, ev.target.result);
                    await renderCurrentPlotDetails();
                };
                reader.readAsDataURL(file);
            } else if (!currentPlotId) alert("请先选择菜地");
        };
        input.click();
    });
    document.getElementById('captureBtn').addEventListener('click', capturePhoto);
    document.getElementById('closeCameraBtn').addEventListener('click', closeCameraModal);
    
    // 日期筛选
    document.getElementById('applyDateFilter').addEventListener('click', () => {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        if (start && end && start > end) { alert("起始日期不能大于结束日期"); return; }
        currentDateFilter = { startDate: start || null, endDate: end || null };
        renderCurrentPlotDetails();
    });
    document.getElementById('clearDateFilter').addEventListener('click', () => {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        currentDateFilter = { startDate: null, endDate: null };
        renderCurrentPlotDetails();
    });
    
    // 登录
    document.getElementById('doLoginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { alert("请填写邮箱和密码"); return; }
        try {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            currentUser = data.user;
            currentUserNameSpan.innerText = currentUser.email;
            loginPanel.style.display = 'none';
            appPanel.style.display = 'block';
            await renderPlotsList();
        } catch (err) {
            alert("登录失败：" + err.message);
        }
    });
    
    // 退出
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        currentUser = null;
        currentPlotId = null;
        loginPanel.style.display = 'flex';
        appPanel.style.display = 'none';
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
    });
    
    // 检查登录状态
    supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) {
            currentUser = session.user;
            currentUserNameSpan.innerText = currentUser.email;
            loginPanel.style.display = 'none';
            appPanel.style.display = 'block';
            renderPlotsList();
        }
    });
    
    supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
            currentUser = session.user;
            currentUserNameSpan.innerText = currentUser.email;
            loginPanel.style.display = 'none';
            appPanel.style.display = 'block';
            renderPlotsList();
        } else {
            currentUser = null;
            loginPanel.style.display = 'flex';
            appPanel.style.display = 'none';
        }
    });
    
    document.getElementById('fertDate').value = new Date().toISOString().slice(0,10);
</script>
</body>
</html>
